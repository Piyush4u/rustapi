<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
    <defs>
        <linearGradient id="rustapiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#FF4B4B;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF8F8F;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="fastapiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#009688;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4DB6AC;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="flaskGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#607D8B;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#90A4AE;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="800" height="400" fill="#0d1117" rx="8" />
    <text x="400" y="50" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Peak Requests Per Second (RPS)</text>
    <text x="400" y="80" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Bombardier Benchmark: 100 concurrent connections, 10,000 requests</text>
    
    <!-- Y-axis -->
    <line x1="150" y1="120" x2="150" y2="350" stroke="#30363d" stroke-width="2" />
    <text x="130" y="150" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="end">RustAPI</text>
    <text x="130" y="240" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="end">FastAPI</text>
    <text x="130" y="330" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="end">Flask</text>
    
    <!-- Bars -->
    <!-- RustAPI: 4101 RPS (Length: 550) -->
    <rect x="150" y="125" width="550" height="40" fill="url(#rustapiGrad)" rx="4" />
    <text x="710" y="151" font-family="monospace" font-size="16" font-weight="bold" fill="#FF4B4B">4,101 RPS</text>
    <text x="160" y="151" font-family="monospace" font-size="14" font-weight="bold" fill="#ffffff">+148% vs FastAPI</text>

    <!-- FastAPI: 1652 RPS (Length: 221) -->
    <rect x="150" y="215" width="221" height="40" fill="url(#fastapiGrad)" rx="4" />
    <text x="380" y="241" font-family="monospace" font-size="16" font-weight="bold" fill="#009688">1,652 RPS</text>

    <!-- Flask: 1312 RPS (Length: 175) -->
    <rect x="150" y="305" width="175" height="40" fill="url(#flaskGrad)" rx="4" />
    <text x="335" y="331" font-family="monospace" font-size="16" font-weight="bold" fill="#607D8B">1,312 RPS</text>

</svg>
